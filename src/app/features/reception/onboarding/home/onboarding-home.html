<div class="flex flex-col px-4 py-6 sm:px-8 sm:py-6 gap-4">

  <!-- Page header -->
  <div class="mb-6">
    <h1 class="text-2xl font-semibold text-zinc-800">Visitor Check-In</h1>
    <p class="text-sm text-zinc-500 mt-1">Welcome — tap the button below to begin the check-in process</p>
  </div>

  <!-- Main card -->
  <div class="rounded-xl border border-zinc-200 bg-white shadow-xs flex flex-col items-center justify-center gap-8 p-6 min-h-[28rem]">

    <!-- Icon -->
    <div class="flex items-center justify-center w-20 h-20 rounded-full bg-[#238cff]/10">
      <i class="pi pi-id-card text-4xl text-[#238cff]"></i>
    </div>

    <div class="text-center">
      <p class="text-xl font-semibold text-zinc-800">Ready to check in</p>
      <p class="text-sm text-zinc-500 mt-1">You will be asked to scan a QR code and take a photo</p>
    </div>

    <!-- Start button -->
    <button
      (click)="start()"
      class="flex items-center justify-center gap-3 px-12 py-4 font-semibold text-white rounded-xl transition-colors duration-150 text-xl"
      style="background-color: #238cff;"
      onmouseover="this.style.backgroundColor='#1a72d4'"
      onmouseout="this.style.backgroundColor='#238cff'"
    >
      <i class="pi pi-play-circle text-2xl"></i>
      Start Check-In
    </button>

  </div>

</div>
