<div class="flex flex-col px-4 py-6 sm:px-8 sm:py-6 gap-4">

  <!-- Page header -->
  <div class="shrink-0">
    <h1 class="text-2xl font-semibold text-zinc-800">Multiple Visits Found</h1>
    <p class="text-sm text-zinc-500 mt-1">Please select the visit you are checking in for</p>
  </div>

  <!-- Visit list -->
  <div class="flex flex-col gap-3">

    @for (assoc of associations(); track assoc.visitId) {
      <button
        (click)="selectVisit(assoc)"
        [disabled]="!!loadingId()"
        class="w-full text-left rounded-xl border bg-white shadow-xs p-5 flex items-center justify-between gap-4 transition-colors duration-150 disabled:opacity-60"
        [class.border-[#238cff]]="loadingId() === assoc.visitId"
        [class.border-zinc-200]="loadingId() !== assoc.visitId"
        [class.hover:border-[#238cff]]="!loadingId()"
        [class.hover:bg-blue-50]="!loadingId()"
      >
        <!-- Visit details -->
        <div class="flex flex-col gap-1 min-w-0">
          <span class="text-sm font-semibold text-zinc-800 truncate">
            Visit ID: {{ assoc.visitId }}
          </span>
          <div class="flex items-center gap-3 text-xs text-zinc-500 flex-wrap">
            @if (assoc.validFrom) {
              <span class="flex items-center gap-1">
                <i class="pi pi-clock"></i>
                From {{ formatTime(assoc.validFrom) }}
              </span>
            }
            @if (assoc.expiresAt) {
              <span class="flex items-center gap-1">
                <i class="pi pi-sign-out"></i>
                Until {{ formatTime(assoc.expiresAt) }}
              </span>
            }
            @if (assoc.tokenPurpose) {
              <span class="flex items-center gap-1">
                <i class="pi pi-tag"></i>
                {{ assoc.tokenPurpose }}
              </span>
            }
          </div>
        </div>

        <!-- Loading spinner or chevron -->
        @if (loadingId() === assoc.visitId) {
          <i class="pi pi-spin pi-spinner text-[#238cff] shrink-0"></i>
        } @else {
          <i class="pi pi-chevron-right text-zinc-400 shrink-0"></i>
        }
      </button>
    }

  </div>

  <!-- Error -->
  @if (errorMessage()) {
    <div class="flex items-center gap-2 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-600">
      <i class="pi pi-exclamation-circle shrink-0"></i>
      <span>{{ errorMessage() }}</span>
    </div>
  }

  <!-- Cancel -->
  <div class="pt-2">
    <button
      (click)="cancel()"
      [disabled]="!!loadingId()"
      class="flex items-center gap-2 text-sm text-zinc-500 hover:text-zinc-700 transition-colors disabled:opacity-40"
    >
      <i class="pi pi-arrow-left text-xs"></i>
      Scan again
    </button>
  </div>

</div>
