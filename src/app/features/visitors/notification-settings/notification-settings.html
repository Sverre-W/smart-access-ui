<div class="p-4 sm:p-8">

  <!-- Header -->
  <div class="mb-8">
    <button
      type="button"
      (click)="goBack()"
      [disabled]="!canGoBack()"
      class="inline-flex items-center gap-1.5 text-xs text-zinc-400 hover:text-zinc-600 transition-colors mb-3 disabled:opacity-40 disabled:cursor-not-allowed disabled:pointer-events-none"
    >
      <i class="pi pi-arrow-left text-[10px]"></i>
      Back to Settings
    </button>
    <h1 class="text-2xl font-semibold text-zinc-800">Notifications</h1>
    <p class="text-sm text-zinc-500 mt-1">
      Configure notification actions for <span class="font-medium text-zinc-700">{{ category() }}</span>.
    </p>
  </div>

  <!-- Editor -->
  @if (category()) {
    <app-notification-editor [category]="category()" />
  }

</div>
