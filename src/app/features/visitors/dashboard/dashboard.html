<div class="p-8">
  <div class="mb-6">
    <h1 class="text-2xl font-semibold text-zinc-800">Dashboard</h1>
    <p class="text-sm text-zinc-500 mt-1">Overview of visitor activity and access metrics.</p>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
    @for (card of statCards; track card.label) {
      <div class="rounded-xl border border-zinc-200 bg-white p-5 shadow-xs">
        <div class="flex items-center justify-between mb-3">
          <span class="text-xs font-semibold text-zinc-400 uppercase tracking-wide">{{ card.label }}</span>
          <div class="w-8 h-8 rounded-lg bg-[#238cff]/10 flex items-center justify-center">
            <i [class]="card.icon + ' text-sm text-[#238cff]'"></i>
          </div>
        </div>
        <p class="text-2xl font-bold text-zinc-800">{{ card.value }}</p>
        <p class="text-xs text-zinc-400 mt-1">{{ card.sub }}</p>
      </div>
    }
  </div>

  <div class="rounded-xl border border-zinc-200 bg-white p-6 shadow-xs">
    <div class="flex items-center gap-2 mb-4">
      <i class="pi pi-clock text-zinc-400"></i>
      <h2 class="text-sm font-semibold text-zinc-700">Recent Activity</h2>
    </div>
    <p class="text-sm text-zinc-400 italic">No recent activity to display.</p>
  </div>
</div>
