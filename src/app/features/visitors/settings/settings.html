<div class="p-8">
  <div class="mb-6">
    <h1 class="text-2xl font-semibold text-zinc-800">Settings</h1>
    <p class="text-sm text-zinc-500 mt-1">Configure Univisit preferences and integrations.</p>
  </div>

  <div class="space-y-4">
    @for (section of sections; track section.title) {
      <div class="rounded-xl border border-zinc-200 bg-white p-6 shadow-xs">
        <div class="flex items-center gap-2 mb-1">
          <i [class]="section.icon + ' text-zinc-400'"></i>
          <h2 class="text-sm font-semibold text-zinc-700">{{ section.title }}</h2>
        </div>
        <p class="text-sm text-zinc-400">{{ section.description }}</p>
      </div>
    }
  </div>
</div>
