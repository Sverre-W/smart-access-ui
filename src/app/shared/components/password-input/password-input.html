<p-iconfield class="w-full">
  <input
    pInputText
    [type]="showPassword() ? 'text' : 'password'"
    [value]="value()"
    [disabled]="isDisabled()"
    [fluid]="true"
    (input)="onInput($event)"
    (blur)="onTouched()"
  />
  <p-inputicon>
    <p-button
      [icon]="showPassword() ? 'pi pi-eye-slash' : 'pi pi-eye'"
      severity="secondary"
      [text]="true"
      size="small"
      [tabindex]="-1"
      (click)="toggleVisibility()"
    />
  </p-inputicon>
</p-iconfield>
