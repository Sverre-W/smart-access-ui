server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Compression ────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-Frame-Options         "SAMEORIGIN"      always;
    add_header Referrer-Policy         "strict-origin"   always;

    # ── Hashed static assets — cache aggressively ─────────────────────────
    # Angular production builds suffix every JS/CSS file with a content hash,
    # so these are safe to cache for a long time.
    location ~* \.[0-9a-f]{8,}\.(js|css|mjs)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Other static assets ────────────────────────────────────────────────
    location ~* \.(ico|png|jpg|jpeg|gif|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── SPA fallback — all unmatched paths serve index.html ───────────────
    location / {
        try_files $uri $uri/ /index.html;

        # index.html must never be cached so browsers always fetch the latest
        # entry point (which references the current hashed bundles).
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
